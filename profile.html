<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>EarnPro – Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="topbar">
  <div style="font-size:19px;font-weight:800">👤 Profile</div>
  <div class="topbar-balance">💰 <span id="tBal">0.00</span> <span>BDT</span></div>
</div>

<div class="page fade-in" style="padding-top:12px">

  <!-- PROFILE HEADER -->
  <div class="prof-header" style="margin-bottom:14px">
    <div class="prof-av" id="pAv">EP</div>
    <div class="prof-name" id="pName">Loading...</div>
    <div class="prof-email" id="pEmail"></div>
    <div class="prof-badge b-free" id="pBadge">👤 Free</div>
    <div style="display:flex;justify-content:center;gap:24px;margin-top:16px">
      <div style="text-align:center">
        <div style="font-size:20px;font-weight:800;color:var(--pu)" id="pBal">৳0</div>
        <div style="font-size:11px;color:var(--t3)">Balance</div>
      </div>
      <div style="width:1px;background:var(--br)"></div>
      <div style="text-align:center">
        <div style="font-size:20px;font-weight:800;color:var(--green)" id="pEarned">৳0</div>
        <div style="font-size:11px;color:var(--t3)">Total Earned</div>
      </div>
      <div style="width:1px;background:var(--br)"></div>
      <div style="text-align:center">
        <div style="font-size:20px;font-weight:800;color:var(--gold)" id="pRefs">0</div>
        <div style="font-size:11px;color:var(--t3)">Referrals</div>
      </div>
    </div>
  </div>

  <!-- UID -->
  <div class="prow" style="margin-bottom:9px">
    <div class="prow-left">
      <div class="prow-ico">🆔</div>
      <div>
        <div class="prow-title">User ID</div>
        <div class="prow-sub" id="pUid" style="font-size:10px;color:var(--t3);word-break:break-all"></div>
      </div>
    </div>
    <button class="copy-btn" id="copyUid" style="background:rgba(124,58,237,.15);border:1px solid var(--br);border-radius:8px;padding:7px 11px;cursor:pointer;color:var(--pl)">📋</button>
  </div>

  <!-- REFERRAL CODE -->
  <div class="stitle" style="margin-top:4px">🔗 Referral</div>
  <div style="margin-bottom:10px">
    <div style="font-size:12px;color:var(--t3);margin-bottom:7px">Your Referral Code</div>
    <div class="copy-row">
      <input type="text" id="refCode" readonly>
      <button class="copy-btn" id="copyCode">📋</button>
    </div>
  </div>
  <div style="margin-bottom:16px">
    <div style="font-size:12px;color:var(--t3);margin-bottom:7px">Your Referral Link</div>
    <div class="copy-row">
      <input type="text" id="refLink" readonly>
      <button class="copy-btn" id="copyLinkBtn">📋</button>
    </div>
  </div>

  <!-- SETTINGS ROWS -->
  <div class="stitle">⚙️ Settings</div>

  <div class="prow" onclick="document.getElementById('editModal').classList.add('open')" style="cursor:pointer;margin-bottom:9px">
    <div class="prow-left">
      <div class="prow-ico">✏️</div>
      <div><div class="prow-title">Edit Username</div><div class="prow-sub">Change your display name</div></div>
    </div>
    <div style="color:var(--t3);font-size:18px">›</div>
  </div>

  <a href="leaderboard.html" class="prow" style="text-decoration:none;color:inherit;margin-bottom:9px">
    <div class="prow-left">
      <div class="prow-ico">🏆</div>
      <div><div class="prow-title">Leaderboard</div><div class="prow-sub">Check your rank</div></div>
    </div>
    <div style="color:var(--t3);font-size:18px">›</div>
  </a>

  <div class="prow" style="margin-bottom:16px">
    <div class="prow-left">
      <div class="prow-ico">🌙</div>
      <div><div class="prow-title">Dark Mode</div><div class="prow-sub">Always on</div></div>
    </div>
    <div class="chip" style="font-size:10px">ON</div>
  </div>

  <button class="btn btn-danger btn-full" id="logoutBtn" style="padding:14px">🚪 Logout</button>
  <div style="height:20px"></div>
</div>

<!-- EDIT USERNAME MODAL -->
<div class="modal-ov" id="editModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ Edit Username</div>
    <div class="igroup">
      <label>New Username</label>
      <input type="text" id="newUsername" class="ifield" placeholder="Enter new username">
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" onclick="document.getElementById('editModal').classList.remove('open')" style="flex:1">Cancel</button>
      <button class="btn btn-primary" id="saveUsername" style="flex:1">Save</button>
    </div>
  </div>
</div>

<nav class="bnav">
  <a href="home.html" class="bnav-item" data-p="home">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
  </a>
  <a href="earn.html" class="bnav-item" data-p="earn">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>Earn
  </a>
  <a href="earn.html" class="bnav-center">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13H13v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
  </a>
  <a href="wallet.html" class="bnav-item" data-p="wallet">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 18v1a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v1h-9a2 2 0 00-2 2v8a2 2 0 002 2h9zm-9-2h10V8H12v8zm4-2.5a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/></svg>Wallet
  </a>
  <a href="profile.html" class="bnav-item active" data-p="profile">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>Profile
  </a>
</nav>

<script type="module">
import { auth, db } from './firebase.js';
import { doc, getDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { toast, copyText, badgeClass, badgeLabel, refCode } from './app.js';

onAuthStateChanged(auth, async user => {
  if (!user) { location.href = 'login.html'; return; }
  const uid = user.uid;
  const snap = await getDoc(doc(db, 'users', uid));
  const u = snap.data();

  document.getElementById('tBal').textContent = parseFloat(u.balance || 0).toFixed(2);
  document.getElementById('pAv').textContent = (u.username || 'EP')[0].toUpperCase();
  document.getElementById('pName').textContent = u.username || 'User';
  document.getElementById('pEmail').textContent = u.email || '';
  document.getElementById('pBadge').className = `prof-badge ${badgeClass(u.membership)}`;
  document.getElementById('pBadge').textContent = badgeLabel(u.membership);
  document.getElementById('pBal').textContent = '৳' + parseFloat(u.balance || 0).toFixed(2);
  document.getElementById('pEarned').textContent = '৳' + parseFloat(u.totalEarned || 0).toFixed(2);
  document.getElementById('pRefs').textContent = u.referralCount || 0;
  document.getElementById('pUid').textContent = uid;

  const code = u.referralCode || refCode(uid);
  const link = `${location.origin}/register.html?ref=${code}`;
  document.getElementById('refCode').value = code;
  document.getElementById('refLink').value = link;

  document.getElementById('copyUid').onclick = () => copyText(uid, document.getElementById('copyUid'));
  document.getElementById('copyCode').onclick = () => copyText(code, document.getElementById('copyCode'));
  document.getElementById('copyLinkBtn').onclick = () => copyText(link, document.getElementById('copyLinkBtn'));

  document.getElementById('newUsername').value = u.username || '';

  document.getElementById('saveUsername').addEventListener('click', async () => {
    const nv = document.getElementById('newUsername').value.trim();
    if (!nv || nv.length < 3) { toast('Min 3 characters', 'warn'); return; }
    await updateDoc(doc(db, 'users', uid), { username: nv });
    document.getElementById('pName').textContent = nv;
    document.getElementById('pAv').textContent = nv[0].toUpperCase();
    document.getElementById('editModal').classList.remove('open');
    toast('Username updated!', 'ok');
  });
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await signOut(auth);
  location.href = 'login.html';
});
</script>
</body>
</html>
