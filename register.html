<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>EarnPro – Register</title>
<link rel="stylesheet" href="style.css">
<style>body{padding-bottom:20px}</style>
</head>
<body>
<div class="auth-wrap fade-in">
  <div class="auth-top">
    <div class="alogo">💎</div>
    <h1>EarnPro</h1>
    <p>Start earning from day one</p>
  </div>
  <div class="auth-card">
    <h2>Create Account ✨</h2>
    <p class="sub">Join thousands of earners</p>
    <div class="igroup ifield-icon">
      <label>Username</label>
      <span class="ico">👤</span>
      <input type="text" id="un" class="ifield" placeholder="cooluser123">
    </div>
    <div class="igroup ifield-icon">
      <label>Email</label>
      <span class="ico">✉️</span>
      <input type="email" id="em" class="ifield" placeholder="you@email.com">
    </div>
    <div class="igroup">
      <label>Password</label>
      <input type="password" id="pw" class="ifield" placeholder="Min 6 characters">
    </div>
    <div class="igroup ifield-icon">
      <label>Referral Code <span style="color:var(--t3)">(Optional)</span></label>
      <span class="ico">🔗</span>
      <input type="text" id="ref" class="ifield" placeholder="EPXXXXXX">
    </div>
    <button class="btn btn-primary btn-full" id="regBtn" style="font-size:16px;padding:15px">✨ Create Account</button>
    <div class="divider"></div>
    <p style="text-align:center;font-size:14px;color:var(--t3)">Already have account? <a href="login.html" class="lnk" style="font-weight:700">Login</a></p>
  </div>
</div>
<script type="module">
import { auth, db } from './firebase.js';
import { createUserWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { doc, setDoc, collection, query, where, getDocs, updateDoc, increment, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { toast, showLoader, hideLoader, refCode } from './app.js';

onAuthStateChanged(auth, u => { if (u) location.href = 'home.html'; });

const urlRef = new URLSearchParams(location.search).get('ref');
if (urlRef) document.getElementById('ref').value = urlRef;

document.getElementById('regBtn').addEventListener('click', async () => {
  const un = document.getElementById('un').value.trim();
  const em = document.getElementById('em').value.trim();
  const pw = document.getElementById('pw').value;
  const rf = document.getElementById('ref').value.trim().toUpperCase();

  if (!un || !em || !pw) { toast('Fill all required fields', 'err'); return; }
  if (un.length < 3) { toast('Username min 3 chars', 'err'); return; }
  if (pw.length < 6) { toast('Password min 6 chars', 'err'); return; }

  showLoader('Creating account...');
  try {
    let referrerId = null;
    if (rf) {
      const q = query(collection(db, 'users'), where('referralCode', '==', rf));
      const snap = await getDocs(q);
      if (snap.empty) { hideLoader(); toast('Invalid referral code', 'err'); return; }
      referrerId = snap.docs[0].id;
    }

    const cred = await createUserWithEmailAndPassword(auth, em, pw);
    const uid = cred.user.uid;
    const code = refCode(uid);

    await setDoc(doc(db, 'users', uid), {
      uid, username: un, email: em,
      balance: 0, totalEarned: 0,
      adsWatched: 0, referralCount: 0,
      referralCode: code, referredBy: referrerId || null,
      membership: 'free', role: 'user',
      isActive: true,
      dailyBonusClaimed: null,
      claimedTasks: [],
      createdAt: serverTimestamp(), lastSeen: serverTimestamp()
    });

    if (referrerId) {
      const setSnap = await getDocs(collection(db, 'settings'));
      const bonus = setSnap.empty ? 5 : (setSnap.docs[0].data().referralBonus || 5);
      await updateDoc(doc(db, 'users', referrerId), {
        balance: increment(bonus), totalEarned: increment(bonus), referralCount: increment(1)
      });
      await setDoc(doc(db, 'referrals', uid), {
        referrerId, newUserId: uid, bonus, createdAt: serverTimestamp()
      });
    }

    toast('Account created! 🎉', 'ok');
    setTimeout(() => location.href = 'home.html', 600);
  } catch(e) {
    hideLoader();
    const m = { 'auth/email-already-in-use':'Email already used','auth/invalid-email':'Invalid email','auth/weak-password':'Password too weak' };
    toast(m[e.code] || 'Registration failed', 'err');
  }
});
</script>
</body>
</html>
